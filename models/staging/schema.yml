version: 2

models:
  - name: stg_payments
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: amount
        data_tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: stg_rentals
    columns:
      - name: rental_id
        data_tests:
          - unique
          - not_null